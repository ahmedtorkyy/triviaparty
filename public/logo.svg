<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="TriviaParty logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#9B7FFF"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7C5CFF" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0B0E14"/>
  <rect x="40" y="40" width="432" height="432" rx="92" fill="url(#g)" filter="url(#s)"/>
  <!-- speech-bubble + question mark = trivia -->
  <path d="M150 130 h212 a44 44 0 0 1 44 44 v128 a44 44 0 0 1 -44 44 h-96 l-58 52 v-52 h-58 a44 44 0 0 1 -44 -44 v-128 a44 44 0 0 1 44 -44 z" fill="#0B0E14" opacity="0.92"/>
  <text x="256" y="290" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="150" font-weight="800" fill="#FFFFFF">?</text>
  <!-- confetti = party -->
  <circle cx="120" cy="120" r="12" fill="#FF6B35"/>
  <circle cx="400" cy="150" r="10" fill="#2DE1A9"/>
  <rect x="380" y="360" width="20" height="20" rx="4" fill="#F2C94C" transform="rotate(20 390 370)"/>
  <rect x="110" y="360" width="18" height="18" rx="4" fill="#2D9CDB" transform="rotate(-15 119 369)"/>
</svg>
